<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNIN-PAGE</title>
    <link rel="stylesheet" href="authStyle.css">
</head>
<body>
    <div id="credentials">
        <div id="auth">
            <div class="contents">
                <img src="../media/VedKriti-icon.png" alt="logo">
            </div>
            <br>
            <div id="welcome" class="contents">
                <h2>Welcome To VedKriti</h1>
            </div>
            <div id="choice">
                <div class="toggle">
                    <input type="radio" name="method" id="signin">
                    <label for="signin">Sign In</label>

                    <input type="radio" name="method" id="login">
                    <label for="login">Log In</label>

                    <span class="slider"></span>
                </div>
            </div>
            <div>
                <form id="signinForm">
                    <label for="username">Username : </label>
                    <input type="text" id="username" name="username" placeholder="Enter Your Username" required>
                    <br>
                    <label for="password">Password : </label>
                    <input type="password" id="password" name="password" placeholder="Enter Your Password" required>
                    <br>
                    <label for="email">Email : </label>
                    <input type="email" id="email" name="email" placeholder="Enter Your Email" required>
                    <br>
                    <p style="color: rgb(94, 7, 7);"><small id = "err"></small></p>
                    <br>
                    <div>
                        <input id="button" type="submit">
                    </div>
                </form>
            </div>
            <br>
            <p><small>By continuing, you agree to our Terms and Privacy Policy.</small></p>
        </div>
    </div>
    <div id="Side-screen">
        <img src="../media/sideImage.jpg" alt="JOURNAL">
    </div>
    <script src="authAction.js"></script>
</body>
</html>
